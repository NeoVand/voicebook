name: Bug report
description: Report a reproducible Voicebook problem.
title: '[Bug]: '
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Do not attach private or copyrighted documents. Create the smallest safe fixture that reproduces the issue.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: List exact steps and whether the model was already cached.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser, OS, and GPU
      placeholder: Chrome 149, macOS 16, Apple M4
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options: [WebGPU, WASM, Not sure]
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal/private document contents from this report.
          required: true
