<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#0b0c0f" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Voicebook" />
		<script>
			try {
				const themes = [
					'sunny',
					'cloudy',
					'meadow',
					'sakura',
					'rainy',
					'midnight',
					'forest',
					'cocoa',
					'ocean',
					'aurora'
				];
				const stored = localStorage.getItem('voicebook:theme');
				const theme =
					stored === 'light'
						? 'cloudy'
						: stored === 'dark'
							? 'midnight'
							: themes.includes(stored)
								? stored
								: 'midnight';
				const colors = {
					sunny: '#f4efe6',
					cloudy: '#edf1f3',
					meadow: '#eaf1e6',
					sakura: '#f6edee',
					rainy: '#101820',
					midnight: '#0b0c0f',
					forest: '#0a100c',
					cocoa: '#130d09',
					ocean: '#08101a',
					aurora: '#0d0a15'
				};
				document.documentElement.dataset.theme = theme;
				document.querySelector('meta[name="theme-color"]')?.setAttribute('content', colors[theme]);
				const fonts = ['newsreader', 'instrument', 'classic', 'system'];
				const font = localStorage.getItem('voicebook:reader-font');
				if (fonts.includes(font) && font !== 'newsreader') {
					document.documentElement.dataset.readerFont = font;
				}
			} catch {
				document.documentElement.dataset.theme = 'midnight';
			}
		</script>
		<meta
			name="description"
			content="Voicebook turns documents into private, on-device speech with browser AI."
		/>
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/voicebook-mark-192.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
